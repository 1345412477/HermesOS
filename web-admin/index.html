<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HermesOS 测试面板 🐾</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #252540;
  --accent: #7c5cfc;
  --accent2: #5ae0b0;
  --text: #e0e0f0;
  --text2: #8888aa;
  --danger: #ff5c7c;
  --warn: #ffb84d;
  --radius: 12px;
}
body {
  font-family: -apple-system, 'Segoe UI', 'PingFang SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 20px;
}
.app {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 320px;
  grid-template-rows: auto 1fr;
  gap: 16px;
  height: calc(100vh - 40px);
}
header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid #2a2a45;
}
header h1 {
  font-size: 18px;
  font-weight: 600;
}
header .status {
  display: flex;
  gap: 16px;
  font-size: 13px;
}
.status-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 6px;
}
.dot-online { background: #5ae0b0; }
.dot-offline { background: #ff5c7c; }
.chat-section {
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid #2a2a45;
  overflow: hidden;
}
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.msg {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: 12px;
  line-height: 1.6;
  font-size: 14px;
}
.msg.user {
  align-self: flex-end;
  background: var(--accent);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.msg.assistant {
  align-self: flex-start;
  background: var(--surface2);
  border-bottom-left-radius: 4px;
}
.msg.assistant table {
  border-collapse: collapse;
  margin: 8px 0;
  font-size: 13px;
  width: 100%;
}
.msg.assistant td, .msg.assistant th {
  border: 1px solid #3a3a55;
  padding: 4px 8px;
  text-align: left;
}
.msg.assistant th {
  background: #2a2a45;
  font-weight: 600;
}
.msg .time {
  font-size: 11px;
  color: var(--text2);
  margin-top: 4px;
}
.chat-input {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  border-top: 1px solid #2a2a45;
  background: var(--surface2);
}
.chat-input input {
  flex: 1;
  padding: 10px 14px;
  border: 1px solid #3a3a55;
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  outline: none;
}
.chat-input input:focus {
  border-color: var(--accent);
}
.chat-input button {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  font-size: 14px;
  cursor: pointer;
  transition: .2s;
}
.chat-input button:hover { background: #6a4ae0; }
.chat-input button:disabled { opacity: .5; cursor: not-allowed; }

.sidebar {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.panel {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid #2a2a45;
  padding: 14px;
}
.panel h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 10px;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 6px;
}
.device-card {
  padding: 10px;
  background: var(--surface2);
  border-radius: 8px;
  margin-bottom: 8px;
  font-size: 13px;
}
.device-card:last-child { margin-bottom: 0; }
.device-card .name {
  font-weight: 600;
  margin-bottom: 4px;
}
.device-card .meta {
  color: var(--text2);
  font-size: 12px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.device-card .caps {
  color: var(--accent2);
  font-size: 12px;
  margin-top: 4px;
}
.cap-tag {
  display: inline-block;
  padding: 2px 6px;
  background: #1a1a3e;
  border-radius: 4px;
  margin: 2px 2px 0 0;
  font-size: 11px;
}
.events-list {
  font-size: 12px;
  max-height: 180px;
  overflow-y: auto;
}
.event-item {
  padding: 4px 0;
  border-bottom: 1px solid #2a2a45;
  color: var(--text2);
}
.event-item:last-child { border: none; }
.quick-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.quick-btn {
  padding: 6px 12px;
  background: var(--surface2);
  border: 1px solid #3a3a55;
  border-radius: 6px;
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  transition: .2s;
}
.quick-btn:hover { border-color: var(--accent); color: var(--accent); }
.loading-dots::after {
  content: '...';
  animation: dots 1.5s steps(4) infinite;
}
@keyframes dots { 0%,100% { content: '.'; } 25% { content: '..'; } 50% { content: '...'; } 75% { content: ''; } }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>🐾 HermesOS 测试面板</h1>
    <div class="status">
      <span><span class="status-dot" id="gwDot"></span>Gateway</span>
      <span><span class="status-dot" id="srvDot"></span>Server</span>
      <span id="deviceCount">📡 0 设备</span>
    </div>
  </header>

  <div class="chat-section">
    <div class="chat-messages" id="chatbox">
      <div class="msg assistant">
        👋 你好主人！问我什么跟设备相关的都行～
        <div class="time">刚刚</div>
      </div>
    </div>
    <div class="chat-input">
      <input id="input" placeholder="说点什么…（比如「会议室有人吗？」）" onkeydown="if(event.key==='Enter') send()">
      <button id="sendBtn" onclick="send()">发送</button>
    </div>
  </div>

  <div class="sidebar">
    <div class="panel">
      <h3>⚡ 快捷指令</h3>
      <div class="quick-actions">
        <button class="quick-btn" onclick="quickAsk('会议室有什么设备？')">📋 会议室设备</button>
        <button class="quick-btn" onclick="quickAsk('帮我看看厨房有什么')">🍳 厨房设备</button>
        <button class="quick-btn" onclick="quickAsk('开一下客厅灯')">💡 开客厅灯</button>
        <button class="quick-btn" onclick="refreshDevices()">🔄 刷新设备</button>
      </div>
    </div>

    <div class="panel" style="flex:1; overflow:hidden; display:flex; flex-direction:column;">
      <h3>📡 设备列表</h3>
      <div id="devices" style="flex:1; overflow-y:auto;">
        <div style="color:var(--text2); font-size:13px; text-align:center; padding:20px;">加载中...</div>
      </div>
    </div>

    <div class="panel">
      <h3>📜 最近事件</h3>
      <div class="events-list" id="eventsList">
        <div style="color:var(--text2); font-size:12px; text-align:center;">加载中...</div>
      </div>
    </div>
  </div>
</div>

<script>
const GATEWAY = 'http://localhost:9100';
const SERVER = 'http://localhost:8000';

// ── 健康检查 ──
async function checkHealth() {
  try {
    const gw = await fetch(`${GATEWAY}/health`).then(r=>r.json());
    document.getElementById('gwDot').className = 'status-dot dot-online';
    const srv = await fetch(`${SERVER}/api/health`).then(r=>r.json());
    document.getElementById('srvDot').className = 'status-dot dot-online';
    document.getElementById('deviceCount').textContent = `📡 ${srv.devices_total} 设备`;
  } catch {
    document.getElementById('gwDot').className = 'status-dot dot-offline';
    document.getElementById('srvDot').className = 'status-dot dot-offline';
  }
}

// ── 设备列表 ──
async function refreshDevices() {
  const el = document.getElementById('devices');
  el.innerHTML = '<div style="color:var(--text2);font-size:13px;text-align:center;padding:20px;">加载中...</div>';
  try {
    const data = await fetch(`${GATEWAY}/api/v1/devices`).then(r=>r.json());
    if (!data.devices || data.devices.length === 0) {
      el.innerHTML = '<div style="color:var(--warn);font-size:13px;text-align:center;padding:20px;">暂无已注册设备</div>';
      return;
    }
    el.innerHTML = data.devices.map(d => `
      <div class="device-card">
        <div class="name">${d.name || d.device_id}</div>
        <div class="meta">
          <span>📍 ${d.location||'未知'}</span>
          <span>🔧 ${d.device_type}</span>
          <span style="color:${d.status==='online'||d.online?'#5ae0b0':'#ff5c7c'}">
            ${(d.status==='online'||d.online) ? '● 在线' : '○ 离线'}
          </span>
        </div>
        <div class="caps">${(d.capabilities||[]).map(c => `<span class="cap-tag">${c.name}</span>`).join('')}</div>
      </div>
    `).join('');
  } catch(e) {
    el.innerHTML = `<div style="color:var(--danger);font-size:13px;text-align:center;padding:20px;">连接失败: ${e.message}</div>`;
  }
}

// ── 事件 ──
async function refreshEvents() {
  try {
    const data = await fetch(`${SERVER}/api/events?limit=10`).then(r=>r.json());
    const el = document.getElementById('eventsList');
    if (!data || data.length === 0) {
      el.innerHTML = '<div style="color:var(--text2);font-size:12px;">暂无事件</div>';
      return;
    }
    el.innerHTML = data.slice(0,10).map(e =>
      `<div class="event-item">
        <span style="color:var(--accent2)">${e.event_type}</span>
        ${e.device_id} · ${new Date(e.timestamp).toLocaleTimeString()}
      </div>`
    ).join('');
  } catch {}
}

// ── 聊天 ──
function addMsg(role, content) {
  const el = document.getElementById('chatbox');
  const d = new Date();
  const ts = d.toLocaleTimeString();
  // Parse markdown-like tables in assistant messages
  let html = content.replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\|(.+)\|/g, (m) => {
      const cells = m.split('|').filter(c=>c.trim()).map(c => c.trim());
      return cells.map(c => `<td>${c.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')}</td>`).join('');
    })
    .replace(/\n/g, '<br>');
  // Convert markdown tables
  if (content.includes('|---')) {
    const lines = content.split('\n');
    let inTable = false;
    html = '';
    let tableRows = [];
    for (let line of lines) {
      if (line.startsWith('|') && line.includes('---')) continue;
      if (line.startsWith('|')) {
        inTable = true;
        const cells = line.split('|').filter(c=>c.trim()).map(c => 
          c.trim().replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/`(.+?)`/g,'<code>$1</code>')
        );
        tableRows.push(`<tr>${cells.map(c=>`<td>${c}</td>`).join('')}</tr>`);
      } else {
        if (inTable && tableRows.length) {
          html += `<table>${tableRows.join('')}</table>`;
          tableRows = [];
          inTable = false;
        }
        html += line + '\n';
      }
    }
    if (inTable && tableRows.length) {
      html += `<table>${tableRows.join('')}</table>`;
    }
    html = html.replace(/\n/g, '<br>');
  }
  el.innerHTML += `<div class="msg ${role}">${html}<div class="time">${ts}</div></div>`;
  el.scrollTop = el.scrollHeight;
}

async function send() {
  const input = document.getElementById('input');
  const btn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text) return;
  
  input.value = '';
  btn.disabled = true;
  addMsg('user', text);
  
  const loadingEl = document.createElement('div');
  loadingEl.className = 'msg assistant';
  loadingEl.innerHTML = '🧠 思考中<span class="loading-dots"></span>';
  loadingEl.id = 'loading';
  document.getElementById('chatbox').appendChild(loadingEl);
  
  try {
    const res = await fetch(`${SERVER}/api/voice/text`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text})
    });
    const data = await res.json();
    document.getElementById('loading').remove();
    addMsg('assistant', data.text || '（无回复）');
    refreshEvents();
  } catch(e) {
    document.getElementById('loading').remove();
    addMsg('assistant', '❌ 请求失败: ' + e.message);
  }
  btn.disabled = false;
}

function quickAsk(text) {
  document.getElementById('input').value = text;
  send();
}

// ── 自动刷新 ──
checkHealth();
refreshDevices();
refreshEvents();
setInterval(checkHealth, 15000);
setInterval(refreshDevices, 10000);
setInterval(refreshEvents, 10000);
</script>
</body>
</html>
